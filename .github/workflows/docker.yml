name: Build and publish Docker images

# Publishes two images to ghcr.io on every push to main (latest) and on every
# version tag push (semver).  No secrets needed — GITHUB_TOKEN drives OIDC
# auth to ghcr.io automatically.
#
# Images:
#   ghcr.io/trevor-viljoen/kronos-wx-backend
#   ghcr.io/trevor-viljoen/kronos-wx-frontend
#
# To release:
#   git tag v0.2.0 && git push origin v0.2.0
#   (or create a GitHub Release — tag push triggers the same job)

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]

jobs:
  build-and-push:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            image: ghcr.io/trevor-viljoen/kronos-wx-backend
            context: .
            file: Dockerfile

          - name: frontend
            image: ghcr.io/trevor-viljoen/kronos-wx-frontend
            context: kronos_web/frontend
            file: kronos_web/frontend/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
